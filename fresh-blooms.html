<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Blooms | The Ethereal Petal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <header class="site-header">
        <nav class="navbar">
            <a href="index.html" class="logo">The Ethereal Petal.</a>
            <ul class="nav-links">
                <li><a href="fresh-blooms.html" style="color:var(--text-primary);">Fresh Blooms</a></li>
                <li><a href="dried.html">Dried</a></li>
                <li><a href="subscriptions.html">Subscriptions</a></li>
                <li><a href="cart.html">Cart (0)</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Page Specific Header -->
        <div class="page-header">
            <img src="https://images.unsplash.com/photo-1507290439931-a861b5a38200?q=80&w=2000&auto=format&fit=crop" class="page-header-bg" alt="Fresh flowers header">
            <div class="page-header-content">
                <span class="eyebrow" style="color: #fff;">From the Soil</span>
                <h1>Fresh Blooms</h1>
            </div>
        </div>

        <!-- Reusing the masonry grid -->
        <section class="collection">
            <div class="product-grid">
                
                <article class="product-card large-feature">
                    <div class="image-frame">
                        <img src="https://images.unsplash.com/photo-1626976109816-08cef8600d7d?q=80&w=1113&auto=format&fit=crop" alt="Peonies">
                    </div>
                    <div class="product-info">
                        <h3>Blushing Peonies</h3>
                        <span class="price">$55.00</span>
                    </div>
                </article>

                <article class="product-card standard">
                    <div class="image-frame">
                        <img src="https://images.unsplash.com/photo-1651592279151-f84dea81a03d?q=80&w=687&auto=format&fit=crop" alt="Ranunculus">
                    </div>
                    <div class="product-info">
                        <h3>Ranunculus Swirl</h3>
                        <span class="price">$42.00</span>
                    </div>
                </article>

                <article class="product-card vertical">
                    <div class="image-frame">
                        <img src="https://images.unsplash.com/photo-1645128828283-3705b4595876?q=80&w=1174&auto=format&fit=crop" alt="Tulips">
                    </div>
                    <div class="product-info">
                        <h3>Dutch Tulips</h3>
                        <span class="price">$38.00</span>
                    </div>
                </article>

                <article class="product-card standard">
                    <div class="image-frame">
                        <img src="https://images.unsplash.com/photo-1562772807-0adcd8c7b910?q=80&w=1170&auto=format&fit=crop" alt="Wildflowers">
                    </div>
                    <div class="product-info">
                        <h3>Farmer's Choice</h3>
                        <span class="price">$65.00</span>
                    </div>
                </article>
            </div>
        </section>
    </main>

</body>
</html>
