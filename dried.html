<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dried Collection | The Ethereal Petal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <header class="site-header">
        <nav class="navbar">
            <a href="index.html" class="logo">The Ethereal Petal.</a>
            <ul class="nav-links">
                <li><a href="fresh-blooms.html">Fresh Blooms</a></li>
                <li><a href="dried.html" style="color:var(--text-primary);">Dried</a></li>
                <li><a href="subscriptions.html">Subscriptions</a></li>
                <li><a href="#" class="cart-link" id="cart-trigger">Cart (<span id="cart-count">0</span>)</a></li> 
            </ul>
        </nav>
    </header>

    <main>
        <div class="page-header">
            <img src="https://images.unsplash.com/photo-1495783519721-5b4bf1fe46c3?q=80&w=1174&auto=format&fit=crop" class="page-header-bg" alt="Dried flowers">
            <div class="page-header-content">
                <span class="eyebrow" style="color: #fff;">Everlasting</span>
                <h1>The Dried Collection</h1>
            </div>
        </div>

        <section class="collection">
            <div class="product-grid">
                
                <article class="product-card wide-feature">
                    <div class="image-frame">
                        <img src="https://images.unsplash.com/photo-1636968292261-5a2be9623a16?q=80&w=1171&auto=format&fit=crop" alt="Pampas Grass">
                    </div>
                    <div class="product-info">
                        <h3>Golden Pampas Cloud</h3>
                        <span class="price">$110.00</span>
                        <button class="add-to-cart-btn"
                                data-id="d1"
                                data-name="Golden Pampas Cloud"
                                data-price="110.00"
                                data-img="https://images.unsplash.com/photo-1636968292261-5a2be9623a16?q=80&w=1171&auto=format&fit=crop">
                            Add to Cart
                        </button>
                    </div>
                </article>

                <article class="product-card standard">
                    <div class="image-frame">
                        <img src="https://images.unsplash.com/photo-1613299835157-e73eda33110a?q=80&w=1170&auto=format&fit=crop" alt="Cotton stems">
                    </div>
                    <div class="product-info">
                        <h3>Cotton Stems</h3>
                        <span class="price">$35.00</span>
                        <button class="add-to-cart-btn"
                                data-id="d2"
                                data-name="Cotton Stems"
                                data-price="35.00"
                                data-img="https://images.unsplash.com/photo-1613299835157-e73eda33110a?q=80&w=1170&auto=format&fit=crop">
                            Add to Cart
                        </button>
                    </div>
                </article>

                <article class="product-card standard">
                    <div class="image-frame">
                        <img src="https://images.unsplash.com/photo-1631167777409-d17fb7e3a926?q=80&w=687&auto=format&fit=crop" alt="Dried Lavender">
                    </div>
                    <div class="product-info">
                        <h3>Provence Lavender</h3>
                        <span class="price">$28.00</span>
                        <button class="add-to-cart-btn"
                                data-id="d3"
                                data-name="Provence Lavender"
                                data-price="28.00"
                                data-img="https://images.unsplash.com/photo-1631167777409-d17fb7e3a926?q=80&w=687&auto=format&fit=crop">
                            Add to Cart
                        </button>
                    </div>
                </article>
            </div>
        </section>
    </main>
    <div class="cart-overlay" id="cart-overlay"></div>
    <aside class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>Your Garden</h2>
            <button class="close-cart" id="close-cart">&times;</button>
        </div>
        
        <!-- Items injected here via JS -->
        <div class="cart-items-container" id="cart-items-container">
            <!-- Empty State Template -->
            <div class="empty-cart-msg">
                <p>Your garden is empty.</p>
                <button class="btn-primary" onclick="closeCart()">Start Planting</button>
            </div>
        </div>

        <div class="cart-footer">
            <div class="cart-total-row">
                <span>Total</span>
                <span id="cart-total-price">$0.00</span>
            </div>
            <button class="checkout-btn" id="checkout-btn">Proceed to Checkout</button>
        </div>
    </aside>
    <div id="toast" class="toast hidden">Item added to garden</div>
        <script src="script.js"></script>

</body>
</html>
